<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Login | AI Predictive Maintenance
</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#0f172a,#2563eb);

font-family:Segoe UI,sans-serif;

}


.login-card{

width:400px;

padding:35px;

background:white;

border-radius:20px;

box-shadow:0 15px 40px rgba(0,0,0,.3);

}


.logo{

text-align:center;

font-size:50px;

margin-bottom:15px;

}


h2{

text-align:center;

font-weight:700;

margin-bottom:25px;

}


.form-control{

border-radius:12px;

padding:12px;

}


.btn-login{

width:100%;

padding:12px;

border-radius:25px;

background:#2563eb;

color:white;

font-weight:bold;

border:none;

}


.btn-login:hover{

background:#1d4ed8;

}


.register{

text-align:center;

margin-top:20px;

}


</style>

</head>


<body>


<div class="login-card">


<div class="logo">
🤖
</div>


<h2>
AI Predictive Maintenance
</h2>



<form action="/login" method="POST">


<div class="mb-3">

<label>Email</label>

<input 
type="email"
class="form-control"
name="email"
placeholder="Enter Email"
required>

</div>



<div class="mb-3">

<label>Password</label>

<input
type="password"
class="form-control"
name="password"
placeholder="Enter Password"
required>

</div>



<button class="btn-login">

Login

</button>


</form>



<div class="register">

Don't have account?

<a href="/register">

Create Account

</a>

</div>


</div>


</body>

</html>
